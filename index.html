<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpicaKOR</title>

<style>

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Arial, sans-serif;
  background: #eef2f8;
  margin: 0;
  padding: 40px;
  color: #1d1d1f;
}

/* Container */
.container {
  max-width: 900px;
  margin: auto;
}

/* Header (same style as your file) */
.header {
  background: linear-gradient(135deg, #0a3d91, #2f6de0);
  color: white;
  padding: 40px 32px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 10px 24px rgba(0,0,0,0.15);
}

.header h1 {
  margin: 0;
  font-size: 42px;
  letter-spacing: 2px;
}

.header h2 {
  margin-top: 10px;
  font-size: 18px;
  font-weight: 400;
  opacity: 0.9;
}

/* Card section */
.section {
  background: white;
  padding: 30px;
  border-radius: 14px;
  margin-top: 30px;
  text-align: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.tagline {
  font-size: 20px;
  font-weight: 600;
  color: #0a3d91;
  margin-bottom: 12px;
}

.subtext {
  font-size: 15px;
  color: #555;
  margin-bottom: 25px;
}

/* Contact box */
.contact {
  background: #f4f7ff;
  border-left: 4px solid #2f6de0;
  padding: 16px;
  border-radius: 8px;
  font-size: 15px;
  color: #2a2a2a;
}

.contact strong {
  color: #0a3d91;
}

footer {
  margin-top: 30px;
  text-align: center;
  font-size: 13px;
  color: #666;
}

</style>
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>SpicaKOR</h1>
    <h2>Coming Soon</h2>
  </div>

  <!-- Main Section -->
  <div class="section">
    <div class="tagline">
      Engineering Financial Precision for Infrastructure
    </div>

    <div class="subtext">
      Enterprise-grade financial decision engine for infrastructure investments.
    </div>

    <div class="contact">
      <strong>Contact:</strong><br><br>
      📧 prasannath@hotmail.com<br>
      📞 +94 775 873 845
    </div>
  </div>

  <footer>
    © 2026 Prasannath Yogasandiran. All rights reserved.
  </footer>

</div>

</body>
</html>
